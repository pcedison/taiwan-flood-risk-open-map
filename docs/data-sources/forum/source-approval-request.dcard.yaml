# Dcard forum source approval request (groundwork draft).
#
# Purpose: move Dcard from `blocked` toward a review decision by documenting the
# proposed collection boundary, data minimization, retention, moderation,
# opt-out, and rate-limit DESIGN. This file is approval-only governance: it does
# NOT authorize or implement crawling, scraping, HTTP fetch, login bypass,
# anti-bot circumvention, raw-content storage, or identity storage.
#
# Status: pending_review. Dcard is sequenced AFTER PTT (see
# docs/reviews/social-source-strategy-2026-06-15.md). Key open risk: Dcard
# fronts its site/API with Cloudflare anti-bot protection, and its API terms may
# not permit third-party automated collection. If a compliant, authorized access
# path cannot be confirmed WITHOUT anti-bot circumvention or login-only content,
# the correct outcome of this review is to keep Dcard DEFERRED rather than
# accepted. The evidence below is PROPOSED policy drafted by engineering on
# 2026-06-15 and is intentionally `reviewed: false` until a human legal/privacy
# reviewer verifies Dcard terms / robots / API rules, fills reviewed_by /
# reviewed_on / references, and decides acceptance or deferral.
#
# Validated with:
#   python infra/scripts/validate_source_allowlist.py \
#     docs/data-sources/forum/source-approval-request.dcard.yaml
version: 1
request:
  source_key: dcard
  platform: Dcard
  requested_acceptance:
    accepted: false
    decision: pending_review
    reason: >-
      Collection boundary, data minimization, retention, moderation, opt-out,
      and rate-limit policy have been drafted (groundwork) but not yet reviewed.
      Dcard remains blocked until terms/robots/API review confirms a compliant
      authorized access path that does NOT rely on anti-bot circumvention or
      login-only content. If no such path exists, the review should keep Dcard
      deferred.
  proposed_collection:
    # Prefer an official/authorized Dcard API path. Public web access is in scope
    # only if robots/ToS permit it without Cloudflare/anti-bot circumvention.
    access_method: >-
      Read-only retrieval via an authorized Dcard API path (if terms permit) or
      public, logged-out forum pages on an approved allowlist. No login-only
      content, no hidden comments, no anti-bot/Cloudflare circumvention, no
      private/deleted content.
    proposed_forum_allowlist:
      # Conservative starting allowlist; flood-relevant public discussion. Final
      # allowlist is subject to per-forum terms/robots review before enablement.
      - 時事        # current affairs: flood/disaster discussion
      - 天氣        # weather (if available as a public forum)
    allowed_operations: []      # approval-only; no operations authorized here
    requested_operations: []    # implementation authorization is a later step
    prohibited_operations_ack:
      - real_crawling
      - scraping
      - http_fetch
      - login_bypass
      - anti_bot_circumvention
      - private_content_access
      - raw_content_storage
      - identity_storage
    no_login_bypass: true
    no_antibot_circumvention: true
    no_private_deleted_or_hidden_content: true
  evidence:
    terms:
      status: pending_review
      reviewed: false
      reviewed_by: ""
      reviewed_on: ""
      summary: >-
        PROPOSED: use only approved public access paths or an official/authorized
        Dcard API. Dcard terms, robots.txt, API rules, and rate limits must be
        linked and accepted before adapter implementation. CRITICAL: confirm the
        access path does not require Cloudflare/anti-bot circumvention or
        login-only content; if it does, Dcard stays deferred. A human reviewer
        must attach references before this becomes approved.
      references: []
    privacy:
      status: pending_review
      reviewed: false
      reviewed_by: ""
      reviewed_on: ""
      summary: >-
        PROPOSED stored field inventory (derived evidence only): source_url,
        forum/category, post_timestamp, derived short summary, location_hints,
        confidence, source_weight, moderation_state. NOT stored: user IDs,
        handles, avatars, school/workplace profile hints, comment identities,
        raw body, or comment text.
      references: []
    retention:
      status: pending_review
      reviewed: false
      reviewed_by: ""
      reviewed_on: ""
      summary: >-
        PROPOSED: raw body/comment data is not retained beyond a short parser
        debug window and is never served to users; derived evidence retention is
        bounded and removable on opt-out/delete, aligned with the project
        Evidence retention policy.
      references: []
    moderation:
      status: pending_review
      reviewed: false
      reviewed_by: ""
      reviewed_on: ""
      summary: >-
        PROPOSED rejection rules: drop personal disputes, identifiable
        individuals, screenshots, content involving minors, medical/safety
        speculation, and unrelated local chatter. False-positive fixtures must
        cover slang, sarcasm, historical flood references, and non-flood water
        mentions before enablement. Non-official evidence cannot be the sole
        basis for a high-confidence flood assertion.
      references: []
    opt_out:
      status: pending_review
      reviewed: false
      reviewed_by: ""
      reviewed_on: ""
      summary: >-
        PROPOSED: URL-based suppression is supported via a documented
        opt-out/delete workflow with an owner, SLA, and public contact path; any
        API-backed deletes or content removals are honored on the next sync, and
        suppressed/deleted content is not re-promoted.
      references: []
    rate_limit:
      status: pending_review
      reviewed: false
      reviewed_by: ""
      reviewed_on: ""
      summary: >-
        PROPOSED: forum allowlist, conservative rate limits, API quota
        monitoring, backoff on 4xx/5xx, duplicate URL canonicalization, and an
        emergency disable flag (SOURCE_DCARD_ENABLED=false) that immediately
        stops fetching. Approved quota and backoff thresholds must be set by the
        reviewer.
      references: []
  governance:
    requested_by: engineering-groundwork-2026-06-15
    reviewed_by: []
    review_date: ""
    public_contact_or_opt_out: ""      # to be assigned by the source owner
    emergency_disable_owner: ""        # to be assigned before enablement
    notes: >-
      Groundwork draft per docs/reviews/social-source-strategy-2026-06-15.md
      (decision: defer FB/IG/Threads; PTT first, Dcard next). This request
      documents proposed policy only. It is not an approval and Dcard must remain
      accepted=false in source-approval-manifest.yaml until legal/privacy/API
      review is complete. Anti-bot/ToS findings may keep Dcard deferred.
  boundary:
    implementation_included: false
    fetcher_included: false
    crawler_included: false
    scraper_included: false
    http_fetch_included: false
