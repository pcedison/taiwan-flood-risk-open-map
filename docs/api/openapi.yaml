openapi: 3.1.0
info:
  title: Flood Risk API
  version: 0.1.0-draft
  summary: API contract draft for the Flood Risk public and admin APIs.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  description: >
    Draft contract derived from PROJECT_SDD sections 7 Domain Model,
    9 Risk Scoring Design, and 10 API Contract Draft. Public risk levels
    are the Traditional Chinese labels `低`, `中`, `高`, `極高`, and `未知`.
    Query heat is exposed only as public attention metadata and must not be
    used as a realtime or historical risk score input.
servers:
  - url: /
    description: Same-origin deployment
security: []
tags:
  - name: Public
    description: Public user-facing APIs.
  - name: Admin
    description: Operational status APIs for workers, data sources, and ingestion.

paths:
  /health:
    get:
      tags:
        - Public
      operationId: getHealth
      summary: Service health.
      responses:
        "200":
          description: Service is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok
                    service: flood-risk-api
                    version: 0.1.0
                    deployment_sha: 0123456789abcdef0123456789abcdef01234567
                    checked_at: "2026-04-28T13:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          description: Public geocode rate limit exceeded.
          headers:
            Retry-After:
              description: Seconds to wait before retrying.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /ready:
    get:
      tags:
        - Public
      operationId: getReadiness
      summary: Service readiness including required dependency checks.
      responses:
        "200":
          description: Service and required dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
              examples:
                ready:
                  value:
                    status: ok
                    service: flood-risk-api
                    version: 0.1.0
                    checked_at: "2026-04-29T03:00:00Z"
                    dependencies:
                      database:
                        status: healthy
                        checked_at: "2026-04-29T03:00:00Z"
                        message: null
                      redis:
                        status: healthy
                        checked_at: "2026-04-29T03:00:00Z"
                        message: null
        "503":
          description: One or more required dependencies are unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/geocode:
    post:
      tags:
        - Public
      operationId: geocode
      summary: Resolve an address, landmark, or parcel query into candidate points.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeocodeRequest"
            examples:
              address:
                value:
                  query: "台北市信義區市府路1號"
                  input_type: address
                  limit: 5
      responses:
        "200":
          description: Candidate places ordered by confidence.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeocodeResponse"
              examples:
                candidates:
                  value:
                    candidates:
                      - place_id: "place_01HTW8QK2Y3Z"
                        name: "台北市信義區市府路1號"
                        type: address
                        point:
                          lat: 25.0375
                          lng: 121.5637
                        admin_code: "63000000"
                        source: mock-geocoder
                        confidence: 0.92
                        precision: exact_address
                        matched_query: "台北市信義區市府路1號"
                        requires_confirmation: false
                        limitations: []
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          description: Public risk-assessment rate limit exceeded.
          headers:
            Retry-After:
              description: Seconds to wait before retrying.
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/risk/assess:
    post:
      tags:
        - Public
      operationId: assessRisk
      summary: Assess realtime and historical flood risk for a point and radius.
      description: >
        Returns public risk levels and human-readable explanation. Numeric
        scoring inputs and thresholds are internal implementation details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskAssessRequest"
            examples:
              now:
                value:
                  point:
                    lat: 25.033
                    lng: 121.5654
                  radius_m: 500
                  time_context: now
                  location_text: 台北101
      responses:
        "200":
          description: Flood risk assessment with evidence preview and freshness metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskAssessmentResponse"
              examples:
                basic:
                  value:
                    assessment_id: "018f3bd2-6e4a-7b10-8d21-3d7fd9676c11"
                    location:
                      lat: 25.033
                      lng: 121.5654
                    radius_m: 500
                    score_version: "risk-v0.1.0"
                    created_at: "2026-04-28T13:00:00Z"
                    expires_at: "2026-04-28T13:10:00Z"
                    realtime:
                      level: "低"
                    historical:
                      level: "高"
                    confidence:
                      level: "中"
                    explanation:
                      summary: "歷史風險高，目前即時風險低。"
                      main_reasons:
                        - "此位置半徑 500 公尺內有歷史淹水相關證據。"
                        - "目前附近雨量與水位資料未達警戒條件。"
                      missing_sources:
                        - "部分水位資料暫時無法更新"
                    evidence:
                      - id: "018f3bd3-1b8f-7ac0-a71d-8c33f7c5073a"
                        source_type: official
                        event_type: flood_potential
                        title: "淹水潛勢圖層交會"
                        summary: "查詢點位落在官方淹水潛勢圖資範圍內。"
                        occurred_at: null
                        observed_at: "2026-04-28T12:50:00Z"
                        ingested_at: "2026-04-28T12:55:00Z"
                        distance_to_query_m: 0
                        confidence: 0.9
                    data_freshness:
                      - source_id: cwa-rainfall
                        name: "中央氣象署雨量資料"
                        health_status: healthy
                        observed_at: "2026-04-28T12:50:00Z"
                        ingested_at: "2026-04-28T12:55:00Z"
                    query_heat:
                      period: P7D
                      attention_level: "低"
                      query_count_bucket: "1-9"
                      unique_approx_count_bucket: "1-9"
                      updated_at: "2026-04-28T13:00:00Z"
                    nearby_realtime_coverage:
                      overall_level: no_local_sensor
                      evaluated_at: "2026-04-28T13:00:00Z"
                      query_radius_m: 500
                      radius_buckets_m:
                        - 500
                        - 1000
                        - 3000
                        - 5000
