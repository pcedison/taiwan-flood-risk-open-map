  /admin/v1/local-source-coverage:
    get:
      tags:
        - Admin
      operationId: listAdminLocalSourceCoverage
      summary: List 22-county local realtime water-source coverage.
      description: >
        Returns the conservative machine-readable catalog for Taiwan local
        government realtime water-source coverage. Counties without a public,
        documented live read API stay visible as candidate, metadata-only,
        needs-application, or not-found; central backbone source keys are
        listed separately and do not imply local direct completion.
      security:
        - AdminBearerAuth: []
      x-required-roles:
        - admin
      responses:
        "200":
          description: Local direct source status and central-backbone fallback catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLocalSourceCoverageResponse"
              examples:
                coverage:
                  value:
                    generated_at: "2026-06-28T00:00:00Z"
                    summary:
                      total_counties: 22
                      local_direct_complete_count: 20
                      local_direct_incomplete_count: 2
                      local_direct_incomplete_counties:
                        - 金門縣
                        - 連江縣
                      central_backbone_minimum_complete_count: 22
                      central_backbone_minimum_incomplete_count: 0
                      counties_missing_hydrologic_backbone: []
                      central_backbone_required_families:
                        - CWA
                        - WRA
                        - NCDR
                        - Civil IoT
                      central_backbone_missing_families: []
                      central_backbone_family_complete: true
                      central_backbone_required_adapter_keys:
                        - official.cwa.rainfall
                        - official.cwa.tide_level
                        - official.wra.water_level
                        - official.ncdr.cap
                        - official.wra_iow.flood_depth
                        - official.civil_iot.flood_sensor
                        - official.civil_iot.sewer_water_level
                        - official.civil_iot.pump_water_level
                        - official.civil_iot.gate_water_level
                      central_backbone_missing_adapter_keys: []
                      request_official_authorization_count: 2
                      verify_live_smoke_count: 0
                      verify_public_api_contract_count: 3
                      counties_requiring_official_authorization:
                        - 花蓮縣
                        - 金門縣
                      counties_requiring_live_smoke: []
                      counties_requiring_public_api_contract:
                        - 苗栗縣
                        - 屏東縣
                        - 臺東縣
                      counties_requiring_metadata_release_monitoring:
                        - 連江縣
                      counties_requiring_official_discovery:
                        - 連江縣
                    counties:
                      - county: 臺南市
                        local_direct_statuses:
                          - ready_implemented
                        local_direct_complete: true
                        central_backbone_available: true
                        production_adapter_keys:
                          - local.tainan.flood_sensor
