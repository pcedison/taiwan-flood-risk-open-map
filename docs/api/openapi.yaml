  /admin/v1/reports/{report_id}/privacy-redaction:
    post:
      tags:
        - Admin
      operationId: redactAdminReportPrivacy
      summary: Redact and tombstone a user report for privacy deletion handling.
      description: >
        Clears report media references, replaces the submitted summary with a
        redaction marker, sets the report status to `deleted`, and writes an
        audit log entry with the admin actor and reason code. The response is a
        minimal tombstone and does not expose point, summary, media references,
        direct contact fields, or private reporter data.
      security:
        - AdminBearerAuth: []
      x-required-roles:
        - admin
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserReportPrivacyRedactionRequest"
            examples:
              reporter_request:
                value:
                  reason_code: reporter_request
              private_data_exposure:
                value:
                  reason_code: private_data_exposure
      responses:
        "200":
          description: User report was redacted and tombstoned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserReportPrivacyRedactionResponse"
              examples:
                redacted:
                  value:
