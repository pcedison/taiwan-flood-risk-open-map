                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    AdminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Opaque admin token
      description: >
        Admin API bearer token. The Phase skeleton accepts a configured opaque
        admin token and treats it as the `admin` role. Production auth may move
        to JWT or another RBAC provider, but every operation tagged Admin must
        continue to require an authenticated admin principal.

  parameters:
    AssessmentId:
      name: assessment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Risk assessment identifier.
    LayerId:
      name: layer_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9.-]{0,79}$"
      description: Stable map layer identifier.
    PageCursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        minLength: 1
      description: Opaque pagination cursor returned by the previous page.
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing, expired, or invalid admin bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated principal does not have the required admin role.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
        - version
        - checked_at
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
            - down
        service:
          type: string
        version:
          type: string
        deployment_sha:
          type:
            - string
            - "null"
        checked_at:
          type: string
          format: date-time
      additionalProperties: false

    ReadyResponse:
      type: object
      required:
        - status
        - service
        - version
        - checked_at
        - dependencies
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
            - down
        service:
          type: string
        version:
          type: string
        deployment_sha:
          type:
            - string
            - "null"
        checked_at:
          type: string
          format: date-time
        dependencies:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DependencyReadiness"
      additionalProperties: false

    DependencyReadiness:
      type: object
      required:
        - status
        - checked_at
        - message
      properties:
        status:
          type: string
          enum:
            - healthy
            - degraded
            - failed
            - unknown
        checked_at:
          type: string
          format: date-time
        message:
          type:
            - string
            - "null"
      additionalProperties: false

    GeocodeRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 300
          description: Address, landmark, or parcel text.
        input_type:
          type: string
          enum:
            - address
            - landmark
            - parcel
          default: address
        limit:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
      additionalProperties: false

    GeocodeResponse:
      type: object
      required:
        - candidates
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/PlaceCandidate"
      additionalProperties: false

    UserReportCreateRequest:
      type: object
      required:
        - point
        - summary
      properties:
        point:
          $ref: "#/components/schemas/LatLng"
        summary:
          type: string
          minLength: 1
          maxLength: 500
          description: Short anonymous flood-condition summary; media and direct personal fields are not accepted.
        challenge_token:
