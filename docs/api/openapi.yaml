                      signal_breakdown:
                        - signal_type: rainfall
                          label: "雨量"
                          coverage_level: no_local_sensor
                          nearest_distance_m: null
                          nearest_source_id: null
                          nearest_observed_at: null
                          counts_by_radius_m:
                            "500": 0
                            "1000": 0
                            "3000": 0
                            "5000": 0
                          fresh_count: 0
                          stale_count: 0
                          status_only_count: 0
                          missing_reason: "查詢點 5 公里內沒有雨量資料。"
                        - signal_type: water_level
                          label: "水位"
                          coverage_level: no_local_sensor
                          nearest_distance_m: null
                          nearest_source_id: null
                          nearest_observed_at: null
                          counts_by_radius_m:
                            "500": 0
                            "1000": 0
                            "3000": 0
                            "5000": 0
                          fresh_count: 0
                          stale_count: 0
                          status_only_count: 0
                          missing_reason: "查詢點 5 公里內沒有水位資料。"
                        - signal_type: flood_depth
                          label: "淹水深度"
                          coverage_level: no_local_sensor
                          nearest_distance_m: null
                          nearest_source_id: null
                          nearest_observed_at: null
                          counts_by_radius_m:
                            "500": 0
                            "1000": 0
                            "3000": 0
                            "5000": 0
                          fresh_count: 0
                          stale_count: 0
                          status_only_count: 0
                          missing_reason: "查詢點 5 公里內沒有淹水深度資料。"
                        - signal_type: sewer_water_level
                          label: "下水道水位"
                          coverage_level: no_local_sensor
                          nearest_distance_m: null
                          nearest_source_id: null
                          nearest_observed_at: null
                          counts_by_radius_m:
                            "500": 0
                            "1000": 0
                            "3000": 0
                            "5000": 0
