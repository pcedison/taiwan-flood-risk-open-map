  /v1/reports:
    post:
      tags:
        - Public
      operationId: createUserReport
      summary: Submit an anonymous user flood report for moderation.
      description: >
        Default-disabled Phase 5 groundwork. When explicitly enabled, accepts
        only a point, short summary, and optional bot-defense challenge token,
        stores the report as pending moderation, and does not accept media,
        EXIF, direct contact, account, or address fields. Deployments that set
        `USER_REPORTS_CHALLENGE_REQUIRED=true` must provide a valid challenge
        token before storage is touched.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserReportCreateRequest"
            examples:
              point_summary_only:
                value:
                  point:
                    lat: 25.033
                    lng: 121.5654
                  summary: "Water is over the curb near the intersection."
                  challenge_token: "turnstile-or-equivalent-token"
      responses:
        "202":
          description: Report accepted into pending moderation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserReportCreateResponse"
              examples:
                pending:
                  value:
                    report_id: "0d51d545-dc6a-4e4b-8f8e-0e42d454d050"
                    status: pending
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: User report intake is disabled by feature flag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Bot-defense challenge verification failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: User report storage or challenge verification is temporarily unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/evidence/{assessment_id}:
    get:
      tags:
        - Public
      operationId: listEvidence
      summary: List evidence attached to an assessment.
      parameters:
        - $ref: "#/components/parameters/AssessmentId"
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated evidence list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceListResponse"
              examples:
                page:
                  value:
                    assessment_id: "018f3bd2-6e4a-7b10-8d21-3d7fd9676c11"
                    items:
                      - id: "018f3bd3-1b8f-7ac0-a71d-8c33f7c5073a"
                        source_id: flood-potential
                        source_type: official
                        event_type: flood_potential
                        title: "淹水潛勢圖層交會"
                        summary: "查詢點位落在官方淹水潛勢圖資範圍內。"
                        url: "https://example.gov.tw/flood-potential"
                        occurred_at: null
                        observed_at: "2026-04-28T12:50:00Z"
                        ingested_at: "2026-04-28T12:55:00Z"
                        point:
                          lat: 25.033
                          lng: 121.5654
                        geometry:
                          type: Point
                          coordinates:
                            - 121.5654
                            - 25.033
                        distance_to_query_m: 0
                        confidence: 0.9
                        freshness_score: 0.8
                        source_weight: 1
                        privacy_level: public
                        raw_ref: "snapshot:flood-potential:20260428"
                    next_cursor: null
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Layer tile metadata is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/layers:
    get:
      tags:
        - Public
      operationId: listLayers
      summary: List available map layers and metadata.
      responses:
        "200":
          description: Available map layers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LayersResponse"
              examples:
                layers:
                  value:
                    layers:
                      - id: flood-potential
                        name: "淹水潛勢"
                        description: "官方淹水潛勢圖資。"
                        category: flood_potential
                        status: available
                        minzoom: 8
                        maxzoom: 18
                        attribution: "Government open data"
                        tilejson_url: "/v1/layers/flood-potential/tilejson"
                        updated_at: "2026-04-28T12:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/layers/{layer_id}/tilejson:
    get:
      tags:
        - Public
      operationId: getLayerTileJson
      summary: Return TileJSON metadata for MapLibre.
      parameters:
        - $ref: "#/components/parameters/LayerId"
      responses:
        "200":
          description: TileJSON document for the requested layer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TileJson"
              examples:
                vector:
                  value:
                    tilejson: "3.0.0"
                    name: "淹水潛勢"
                    version: "2026-04-28"
                    attribution: "Government open data"
                    status: available
                    scheme: xyz
                    tiles:
                      - "/v1/tiles/flood-potential/{z}/{x}/{y}.mvt"
                    tile_url_source: local_vector_tile_endpoint
                    cache_control: "public, max-age=60"
                    minzoom: 8
                    maxzoom: 18
                    updated_at: "2026-04-28T12:00:00Z"
                    bounds:
                      - 119.3
                      - 21.8
                      - 122.1
                      - 25.4
                    vector_layers:
                      - id: flood_potential
                        fields:
                          depth_category: String
                          source_id: String
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/tiles/{layer_id}/{z}/{x}/{y}.mvt:
    get:
      tags:
        - Public
      operationId: getVectorTile
      summary: Return a Mapbox Vector Tile for a seeded map layer.
      parameters:
        - $ref: "#/components/parameters/LayerId"
        - name: z
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
            maximum: 24
          description: Tile zoom.
        - name: x
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          description: Tile x coordinate.
        - name: y
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          description: Tile y coordinate.
      responses:
        "200":
          description: Mapbox Vector Tile binary payload.
          headers:
            X-Tile-Layer:
              description: Layer id used to produce the tile.
              schema:
                type: string
            Cache-Control:
              description: Tile cache policy.
              schema:
                type: string
          content:
            application/vnd.mapbox-vector-tile:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Tile storage unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/v1/jobs:
    get:
      tags:
        - Admin
      operationId: listAdminJobs
      summary: List background job status.
      security:
        - AdminBearerAuth: []
      x-required-roles:
        - admin
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStatus"
        - name: job_key
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 120
      responses:
        "200":
          description: Job status rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminJobsResponse"
              examples:
                jobs:
                  value:
                    jobs:
                      - job_key: ingest.cwa.rainfall
                        adapter_key: cwa.rainfall
                        started_at: "2026-04-28T12:50:00Z"
                        finished_at: "2026-04-28T12:55:00Z"
                        status: succeeded
                        items_fetched: 120
                        items_promoted: 118
                        items_rejected: 2
                        error_code: null
                        error_message: null
                        source_timestamp_min: "2026-04-28T12:00:00Z"
                        source_timestamp_max: "2026-04-28T12:50:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: Admin job repository unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/v1/sources:
    get:
      tags:
        - Admin
      operationId: listAdminSources
      summary: List source health and data freshness.
      security:
        - AdminBearerAuth: []
      x-required-roles:
        - admin
      parameters:
        - name: health_status
