    LocalSourceCoverage:
      type: object
      required:
        - county
        - local_direct_statuses
        - local_direct_complete
        - central_backbone_available
        - production_adapter_keys
        - production_source_urls
        - central_backbone_adapter_keys
        - central_backbone_signal_types
        - central_backbone_required_signal_types
        - central_backbone_minimum_complete
        - central_backbone_missing_signal_types
        - central_backbone_coverage_level
        - rainfall_available
        - water_level_available
        - flood_depth_available
        - sewer_water_level_available
        - pump_or_gate_status_available
        - status_only_available
        - missing_signal_types
        - candidate_source_names
        - candidate_source_urls
        - candidate_contract_findings
        - candidate_contract_missing_fields
        - candidate_contract_non_measurement_notes
        - metadata_source_names
        - metadata_source_urls
        - status_only_source_names
        - status_only_source_urls
        - status_only_signal_types
        - non_qualifying_source_names
        - non_qualifying_source_urls
        - non_qualifying_source_reasons
        - application_urls
        - requires_application
        - application_note
        - next_action_code
        - upgrade_priority
        - blocking_reason
        - notes
      properties:
        county:
          type: string
        local_direct_statuses:
          type: array
          items:
            $ref: "#/components/schemas/LocalDirectSourceStatus"
          description: Conservative local-government direct source states for this county/city.
        local_direct_complete:
          type: boolean
          description: True only when at least one official local-government direct live adapter is implemented.
        central_backbone_available:
          type: boolean
          description: True when central official backbone adapters remain available for baseline realtime context.
        production_adapter_keys:
          type: array
          items:
            type: string
          description: Implemented local adapter keys that can ingest official public live data.
        production_source_urls:
          type: array
          items:
            type: string
            format: uri
          description: Official source/API URLs backing implemented local adapters.
        central_backbone_adapter_keys:
          type: array
          items:
            type: string
          description: Central official adapters available as fallback/context; this does not mark local direct completion.
        central_backbone_signal_types:
          type: array
          items:
            type: string
          description: Deduplicated realtime signal categories supplied by central official backbone adapters for this county/city.
        central_backbone_required_signal_types:
          type: array
          items:
            type: string
          description: Minimum signal categories expected for baseline county/city realtime coverage.
        central_backbone_minimum_complete:
          type: boolean
          description: True when rainfall, CAP alert context, and at least one hydrologic observation signal are available.
        central_backbone_missing_signal_types:
          type: array
          items:
            type: string
          description: Missing minimum baseline categories. hydrologic_observation is satisfied by any water-level, flood-depth, sewer, pump, gate, or pond signal.
        central_backbone_coverage_level:
          type: string
          description: minimum_met, needs_hydrologic_backbone, or incomplete.
        rainfall_available:
          type: boolean
          description: True when rainfall realtime evidence is available from local or central official sources.
        water_level_available:
          type: boolean
          description: True when river, pond, or other water-level realtime evidence is available.
        flood_depth_available:
          type: boolean
          description: True when flood-depth realtime evidence is available from a high-confidence source.
        sewer_water_level_available:
          type: boolean
          description: True when sewer or drainage water-level realtime evidence is available.
        pump_or_gate_status_available:
          type: boolean
          description: True when pump or gate status/water-level realtime evidence is available.
        status_only_available:
          type: boolean
          description: True when an official source has observed status but no water-depth or water-level measurement.
        missing_signal_types:
          type: array
          items:
            type: string
          description: Realtime signal categories still missing after local and central official coverage are combined.
        candidate_source_names:
          type: array
          items:
            type: string
          description: Official candidate systems that still lack public live API documentation.
        candidate_source_urls:
          type: array
          items:
            type: string
            format: uri
          description: Official candidate pages, API contracts, or system URLs that need contract/live-smoke verification before adapter work.
        candidate_contract_findings:
          type: array
          items:
            type: string
          description: Reviewed facts from official candidate pages that still do not prove a production read API.
        candidate_contract_missing_fields:
          type: array
          items:
            type: string
          description: Production read API fields missing from the reviewed candidate source.
        candidate_contract_non_measurement_notes:
          type: array
          items:
            type: string
          description: Candidate pages that expose status, warning thresholds, images, or other non-measurement evidence.
        metadata_source_names:
          type: array
          items:
            type: string
          description: Static station, pump, gate, or flood-prone-area datasets that cannot be ingested as realtime observations.
        metadata_source_urls:
          type: array
          items:
            type: string
            format: uri
          description: Official static metadata dataset URLs useful for station joins or release monitoring.
        status_only_source_names:
          type: array
          items:
            type: string
          description: Official status-only sources that have freshness and station context but no measurement value.
        status_only_source_urls:
          type: array
          items:
            type: string
            format: uri
          description: Source URLs for status-only official signals.
        status_only_signal_types:
          type: array
          items:
            type: string
          description: Low-confidence status-only signal categories that must not be treated as depth, water level, or rainfall.
        non_qualifying_source_names:
          type: array
          items:
            type: string
          description: Official sources that were reviewed but must not satisfy realtime water-signal coverage.
        non_qualifying_source_urls:
          type: array
          items:
            type: string
            format: uri
          description: URLs for reviewed official sources that do not qualify as realtime water-signal evidence.
        non_qualifying_source_reasons:
          type: array
          items:
            type: string
          description: Why each reviewed official source is excluded from realtime risk evidence.
        application_urls:
          type: array
          items:
            type: string
            format: uri
          description: Official application, system, or documentation URLs needed for authorization follow-up.
        requires_application:
          type: boolean
        application_note:
          type:
            - string
            - "null"
        next_action_code:
          $ref: "#/components/schemas/LocalSourceNextAction"
        upgrade_priority:
          type: integer
          minimum: 1
          maximum: 5
          description: Lower values should be addressed first when improving local-direct coverage.
        blocking_reason:
          type:
            - string
            - "null"
          description: Why this county/city is not yet local-direct complete, or null for implemented adapters.
        notes:
          type: array
          items:
            type: string
      additionalProperties: false

    LocalDirectSourceStatus:
      type: string
      enum:
        - ready_implemented
        - candidate
        - needs_review
        - metadata_only
