  /admin/v1/reports/{report_id}/moderation:
    patch:
      tags:
        - Admin
      operationId: moderateAdminReport
      summary: Mark a user report as approved, rejected, or spam.
      description: >
        Updates moderation status and records an audit log entry with the admin
        actor reference, previous/new statuses, and a required reason code. The
        operation does not alter media references or add reporter personal data.
      security:
        - AdminBearerAuth: []
      x-required-roles:
        - admin
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserReportModerationRequest"
            examples:
              approve:
                value:
                  status: approved
                  reason_code: verified_flood_signal
              reject:
                value:
                  status: rejected
                  reason_code: insufficient_detail
              spam:
                value:
                  status: spam
                  reason_code: abuse_or_spam
      responses:
        "200":
          description: Moderation status was updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserReportModerationResponse"
              examples:
                approved:
                  value:
                    report:
                      report_id: "0d51d545-dc6a-4e4b-8f8e-0e42d454d050"
                      status: approved
                      point:
                        lat: 25.033
                        lng: 121.5654
                      summary: "Water at ankle depth."
                      created_at: "2026-04-29T12:00:00Z"
                      reviewed_at: "2026-04-29T12:05:00Z"
