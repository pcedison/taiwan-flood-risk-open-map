# Template evidence record for docs and CI.
#
# This repository intentionally does not include real Zeabur secrets, private
# alert routes, or production drill artifacts. Keep this file
# production_complete: false. For private production evidence, copy this shape
# into an ops-controlled location, replace placeholders with real references,
# set production_complete: true and readiness_state: production-complete, then
# run:
#
#   python infra/scripts/validate_production_readiness_evidence.py --production-complete <private-evidence.yaml>

schema_version: production-readiness-evidence/v1
production_complete: false
readiness_state: not-production-complete

