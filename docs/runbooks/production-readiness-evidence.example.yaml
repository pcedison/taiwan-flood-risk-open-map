    rollback_plan: disable CWA live ingestion and fall back to persisted/stale official-source status
    kill_switches:
      - SOURCE_CWA_API_ENABLED=false
      - SOURCE_CWA_ENABLED=false
    disabled_reason: production CWA credential, egress, cadence, and alert ownership evidence is not accepted in this template
