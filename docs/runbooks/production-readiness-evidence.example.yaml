slos:
  - name: API availability
    owner: platform-owner
    sli: up{job="flood-risk-api"} or flood_risk_api_ready
    target: 99.5% over 7 days
    evidence_ref: docs/runbooks/production-readiness.md#slo-and-sli-targets
  - name: Source freshness
    owner: source-owner
    sli: enabled sources with flood_risk_source_freshness_stale == 0
    target: 95% of checks over 7 days
    evidence_ref: docs/runbooks/production-readiness.md#slo-and-sli-targets
  - name: Worker heartbeat
    owner: worker-owner
    sli: worker heartbeat age under 300 seconds
    target: 99% of checks over 7 days
    evidence_ref: docs/runbooks/production-readiness.md#slo-and-sli-targets
  - name: Scheduler heartbeat
    owner: platform-owner
    sli: scheduler heartbeat age under 600 seconds and one scheduler replica
    target: 99% of checks over 7 days
    evidence_ref: docs/runbooks/production-readiness.md#slo-and-sli-targets
  - name: Queue visibility
    owner: worker-owner
    sli: queue exporter available
    target: 99% of checks over 7 days
    evidence_ref: docs/runbooks/production-readiness.md#slo-and-sli-targets
  - name: Backup restore
    owner: database-owner
    sli: latest backup can be inspected and restored to scratch
    target: one successful drill per release candidate
    evidence_ref: docs/runbooks/backup-restore-drill.md

