# Template evidence record for docs and CI.
#
# This file is intentionally not production launch evidence. Keep
# production_complete: false here. For real public launch review, copy this
# shape to a private ops location, replace owners and evidence refs with real
# values, set production_complete: true and readiness_state: production-complete,
# then run:
#
#   python infra/scripts/validate_public_reports_launch_evidence.py --production-complete <private-evidence.yaml>

schema_version: public-reports-launch-evidence/v1
production_complete: false
readiness_state: not-production-complete
captured_at: "2026-05-04T00:00:00+08:00"
launch_owner: launch-owner

bot_defense:
