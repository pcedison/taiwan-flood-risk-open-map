    backend: redis
    max_requests: 20
    window_seconds: 60
    policy_ref: docs/runbooks/public-reports-governance.md#production-launch-evidence
  abuse_salt:
    owner: privacy-governance-owner
    secret_storage_ref: <set-in-zeabur-secret-env>

moderation:
