name: flood-risk

x-python-env: &python-env
  APP_ENV: ${APP_ENV:-local}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DATABASE_URL: ${DATABASE_URL:-postgresql://flood_risk:change-me-local@postgres:5432/flood_risk}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
  MINIO_BUCKET_RAW_SNAPSHOTS: ${MINIO_BUCKET_RAW_SNAPSHOTS:-flood-risk-raw}
  WORKER_QUEUE: ${WORKER_QUEUE:-default}
  SOURCE_CWA_ENABLED: ${SOURCE_CWA_ENABLED:-}
  SOURCE_WRA_ENABLED: ${SOURCE_WRA_ENABLED:-}
  SOURCE_FLOOD_POTENTIAL_ENABLED: ${SOURCE_FLOOD_POTENTIAL_ENABLED:-}
  SOURCE_NEWS_ENABLED: ${SOURCE_NEWS_ENABLED:-false}
  SOURCE_FORUM_ENABLED: ${SOURCE_FORUM_ENABLED:-false}
  SOURCE_PTT_ENABLED: ${SOURCE_PTT_ENABLED:-false}
  SOURCE_DCARD_ENABLED: ${SOURCE_DCARD_ENABLED:-false}
  SOURCE_PTT_CANDIDATE_APPROVAL_ACK: ${SOURCE_PTT_CANDIDATE_APPROVAL_ACK:-false}
  SOURCE_DCARD_CANDIDATE_APPROVAL_ACK: ${SOURCE_DCARD_CANDIDATE_APPROVAL_ACK:-false}
  SOURCE_TERMS_REVIEW_ACK: ${SOURCE_TERMS_REVIEW_ACK:-false}
  SOURCE_SAMPLE_DATA_ENABLED: ${SOURCE_SAMPLE_DATA_ENABLED:-false}
  GDELT_SOURCE_ENABLED: ${GDELT_SOURCE_ENABLED:-false}
  GDELT_BACKFILL_ENABLED: ${GDELT_BACKFILL_ENABLED:-false}
  GDELT_REHEARSAL_QUERIES: ${GDELT_REHEARSAL_QUERIES:-}
  GDELT_REHEARSAL_MAX_RECORDS_PER_QUERY: ${GDELT_REHEARSAL_MAX_RECORDS_PER_QUERY:-10}
  GDELT_REHEARSAL_CADENCE_SECONDS: ${GDELT_REHEARSAL_CADENCE_SECONDS:-60}
  GDELT_PRODUCTION_INGESTION_ENABLED: ${GDELT_PRODUCTION_INGESTION_ENABLED:-false}
  GDELT_PRODUCTION_APPROVAL_EVIDENCE_PATH: ${GDELT_PRODUCTION_APPROVAL_EVIDENCE_PATH:-}
  GDELT_PRODUCTION_APPROVAL_EVIDENCE_ACK: ${GDELT_PRODUCTION_APPROVAL_EVIDENCE_ACK:-false}
  GDELT_PRODUCTION_QUERIES: ${GDELT_PRODUCTION_QUERIES:-}
  GDELT_PRODUCTION_MAX_RECORDS_PER_QUERY: ${GDELT_PRODUCTION_MAX_RECORDS_PER_QUERY:-10}
  GDELT_PRODUCTION_CADENCE_SECONDS: ${GDELT_PRODUCTION_CADENCE_SECONDS:-60}
  REALTIME_OFFICIAL_ENABLED: ${REALTIME_OFFICIAL_ENABLED:-true}
  CWA_API_AUTHORIZATION: ${CWA_API_AUTHORIZATION:-}
  SOURCE_CWA_API_ENABLED: ${SOURCE_CWA_API_ENABLED:-false}
  CWA_API_URL: ${CWA_API_URL:-}
  CWA_API_TIMEOUT_SECONDS: ${CWA_API_TIMEOUT_SECONDS:-8}
  SOURCE_WRA_API_ENABLED: ${SOURCE_WRA_API_ENABLED:-false}
  WRA_API_URL: ${WRA_API_URL:-}
  WRA_API_TOKEN: ${WRA_API_TOKEN:-}
  WRA_API_TIMEOUT_SECONDS: ${WRA_API_TIMEOUT_SECONDS:-8}
  SOURCE_FLOOD_POTENTIAL_GEOJSON_ENABLED: ${SOURCE_FLOOD_POTENTIAL_GEOJSON_ENABLED:-false}
  FLOOD_POTENTIAL_GEOJSON_URL: ${FLOOD_POTENTIAL_GEOJSON_URL:-}
  FLOOD_POTENTIAL_GEOJSON_TIMEOUT_SECONDS: ${FLOOD_POTENTIAL_GEOJSON_TIMEOUT_SECONDS:-8}
  USER_REPORTS_ENABLED: ${USER_REPORTS_ENABLED:-false}
  USER_REPORTS_RATE_LIMIT_ENABLED: ${USER_REPORTS_RATE_LIMIT_ENABLED:-true}
  USER_REPORTS_RATE_LIMIT_BACKEND: ${USER_REPORTS_RATE_LIMIT_BACKEND:-redis}
  USER_REPORTS_RATE_LIMIT_MAX_REQUESTS: ${USER_REPORTS_RATE_LIMIT_MAX_REQUESTS:-5}
  USER_REPORTS_RATE_LIMIT_WINDOW_SECONDS: ${USER_REPORTS_RATE_LIMIT_WINDOW_SECONDS:-60}
  USER_REPORTS_RATE_LIMIT_CLIENT_HEADER: ${USER_REPORTS_RATE_LIMIT_CLIENT_HEADER:-}
  ABUSE_HASH_SALT: ${ABUSE_HASH_SALT:-}
  USER_REPORTS_CHALLENGE_REQUIRED: ${USER_REPORTS_CHALLENGE_REQUIRED:-false}
  USER_REPORTS_CHALLENGE_PROVIDER: ${USER_REPORTS_CHALLENGE_PROVIDER:-turnstile}
  USER_REPORTS_CHALLENGE_SECRET_KEY: ${USER_REPORTS_CHALLENGE_SECRET_KEY:-}
  USER_REPORTS_CHALLENGE_STATIC_TOKEN: ${USER_REPORTS_CHALLENGE_STATIC_TOKEN:-}
  USER_REPORTS_CHALLENGE_VERIFY_URL: ${USER_REPORTS_CHALLENGE_VERIFY_URL:-https://challenges.cloudflare.com/turnstile/v0/siteverify}
  USER_REPORTS_CHALLENGE_TIMEOUT_SECONDS: ${USER_REPORTS_CHALLENGE_TIMEOUT_SECONDS:-2}
  USER_REPORTS_CHALLENGE_NON_PRODUCTION_BYPASS: ${USER_REPORTS_CHALLENGE_NON_PRODUCTION_BYPASS:-false}

services:
  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    command:
      - sh
      - -c
      - npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      NEXT_PUBLIC_BASEMAP_STYLE_URL: ${NEXT_PUBLIC_BASEMAP_STYLE_URL:-}
      NEXT_PUBLIC_BASEMAP_KIND: ${NEXT_PUBLIC_BASEMAP_KIND:-}
      NEXT_PUBLIC_BASEMAP_PMTILES_URL: ${NEXT_PUBLIC_BASEMAP_PMTILES_URL:-}
      NEXT_PUBLIC_BASEMAP_RASTER_TILES: ${NEXT_PUBLIC_BASEMAP_RASTER_TILES:-}
      NEXT_PUBLIC_BASEMAP_ATTRIBUTION: ${NEXT_PUBLIC_BASEMAP_ATTRIBUTION:-}
      WEB_PORT: ${WEB_PORT:-3000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - .:/workspace
      - web-next-cache:/workspace/apps/web/.next
      - web-node-modules:/workspace/apps/web/node_modules
    depends_on:
      - api

  api:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    command:
      - sh
      - -c
      - pip install -e . && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *python-env
      API_PORT: ${API_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    image: python:3.12-slim
    working_dir: /workspace/apps/workers
    command:
      - sh
      - -c
      - pip install -e . && python -m app.main
    environment:
      <<: *python-env
      WORKER_IDLE_SECONDS: ${WORKER_IDLE_SECONDS:-60}
      WORKER_METRICS_TEXTFILE_PATH: ${WORKER_METRICS_TEXTFILE_PATH:-}
    volumes:
      - .:/workspace
      - monitoring-textfile:/var/lib/node_exporter/textfile_collector
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  scheduler:
    image: python:3.12-slim
    working_dir: /workspace/apps/workers
    command:
      - sh
      - -c
      - pip install -e . && python -m app.scheduler
    environment:
      <<: *python-env
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-300}
      SCHEDULER_METRICS_TEXTFILE_PATH: ${SCHEDULER_METRICS_TEXTFILE_PATH:-}
    volumes:
      - .:/workspace
      - monitoring-textfile:/var/lib/node_exporter/textfile_collector
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    image: postgis/postgis:16-3.4
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        set -eu
        for migration in /workspace/infra/migrations/[0-9][0-9][0-9][0-9]_*.sql; do
          echo "Applying $${migration}"
          psql "$$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$$migration"
        done
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://flood_risk:change-me-local@postgres:5432/flood_risk}
    volumes:
      - .:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flood_risk}
      POSTGRES_USER: ${POSTGRES_USER:-flood_risk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local}
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - api
      - node-exporter
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-local}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/flood-risk-runtime-dashboard.json:/var/lib/grafana/dashboards/flood-risk-runtime-dashboard.json:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --collector.disable-defaults
      - --collector.textfile
      - --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - monitoring-textfile:/var/lib/node_exporter/textfile_collector:ro
    profiles:
      - monitoring

volumes:
  postgres-data:
  redis-data:
  minio-data:
  web-next-cache:
  web-node-modules:
  prometheus-data:
  grafana-data:
  monitoring-textfile:
