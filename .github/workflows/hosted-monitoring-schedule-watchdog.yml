name: Hosted Monitoring Schedule Watchdog

on:
  workflow_dispatch:
    inputs:
      expected_head_sha:
        description: "Expected Hosted Monitoring schedule run SHA. Defaults to this workflow SHA."
        required: false
        type: string
      expected_deployment_sha:
        description: "Expected fallback Hosted Monitoring deployment SHA. Defaults to production-release branch HEAD."
        required: false
        type: string
      max_age_minutes:
        description: "Maximum accepted age for the latest Hosted Monitoring schedule run."
        required: false
        default: 90
        type: number
      fail_on_not_ready:
        description: "Fail the watchdog run when schedule readiness is not accepted. Scheduled runs report and dispatch fallback by default."
        required: false
        default: false
        type: boolean
      dispatch_hosted_monitoring_on_failure:
        description: "Dispatch Hosted Monitoring as a fallback when schedule readiness fails."
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "17,47 * * * *"

jobs:
  hosted-schedule-watchdog:
    name: Hosted schedule watchdog
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      EXPECTED_HEAD_SHA: ${{ github.event.inputs.expected_head_sha || github.sha }}
      MAX_AGE_MINUTES: ${{ github.event.inputs.max_age_minutes || '90' }}
      FAIL_ON_NOT_READY: ${{ github.event.inputs.fail_on_not_ready || 'false' }}
      DISPATCH_HOSTED_MONITORING_ON_FAILURE: ${{ github.event.inputs.dispatch_hosted_monitoring_on_failure || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare artifact directory
        run: mkdir -p artifacts

      - name: Resolve fallback deployment SHA
        env:
          INPUT_EXPECTED_DEPLOYMENT_SHA: ${{ github.event.inputs.expected_deployment_sha }}
        run: |
          set -euo pipefail
          source="workflow_dispatch_input"
          expected_sha="${INPUT_EXPECTED_DEPLOYMENT_SHA:-}"
          if [ -z "${expected_sha}" ]; then
            source="production-release"
            expected_sha="$(git ls-remote --heads origin production-release | awk '{print $1}' || true)"
          fi
          if [ -z "${expected_sha}" ]; then
            source="workflow_commit_sha"
            expected_sha="${GITHUB_SHA}"
          fi
          echo "EXPECTED_DEPLOYMENT_SHA=${expected_sha}" >> "${GITHUB_ENV}"
          echo "Expected fallback Hosted Monitoring deployment SHA (${source}): ${expected_sha}"

      - name: Hosted Monitoring schedule readiness
        run: |
          set -euo pipefail
          readiness_args=()
          if [ "${FAIL_ON_NOT_READY}" = "true" ]; then
            readiness_args+=(--fail-on-not-ready)
          fi
          python scripts/hosted-monitoring-schedule-readiness.py \
            --expected-head-sha "${EXPECTED_HEAD_SHA}" \
            --max-age-minutes "${MAX_AGE_MINUTES}" \
            --output artifacts/hosted-monitoring-schedule-readiness.json \
            --markdown-output artifacts/hosted-monitoring-schedule-readiness.md \
            --completion-evidence-output artifacts/hosted-monitoring-schedule-completion-evidence.json \
            "${readiness_args[@]}"

      - name: Read schedule readiness status
        id: readiness-status
        if: ${{ always() }}
        run: |
          set -euo pipefail
          status="$(
            python - <<'PY' 2>/dev/null || true
          import json

          with open("artifacts/hosted-monitoring-schedule-readiness.json", encoding="utf-8") as handle:
              print(json.load(handle).get("status", "missing"))
          PY
          )"
          if [ -z "${status}" ]; then
            status="missing"
          fi
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          echo "Hosted Monitoring schedule readiness status: ${status}"

      - name: Dispatch fallback Hosted Monitoring
        if: ${{ always() && env.DISPATCH_HOSTED_MONITORING_ON_FAILURE == 'true' && steps.readiness-status.outputs.status != 'passed' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const workflowId = "hosted-monitoring.yml";
            const expectedHeadSha = process.env.EXPECTED_HEAD_SHA;
            const expectedDeploymentSha = process.env.EXPECTED_DEPLOYMENT_SHA || expectedHeadSha;
            const runUrl = [
              process.env.GITHUB_SERVER_URL,
              process.env.GITHUB_REPOSITORY,
              "actions/runs",
              process.env.GITHUB_RUN_ID,
            ].join("/");
            const evidence = {
              schema_version: "hosted-monitoring-schedule-fallback-dispatch/v1",
              captured_at: new Date().toISOString(),
              status: "requested",
              reason: "schedule_readiness_failed",
              source_watchdog_run: {
                workflow: process.env.GITHUB_WORKFLOW,
                event: process.env.GITHUB_EVENT_NAME,
                run_id: process.env.GITHUB_RUN_ID,
                run_url: runUrl,
                head_sha: process.env.GITHUB_SHA,
              },
              target_workflow: {
                workflow_id: workflowId,
                ref: "main",
                inputs: {
                  expected_deployment_sha: expectedDeploymentSha,
                },
              },
              notes: [
                "Fallback dispatch is schedule watchdog remediation, not scheduled_freshness_checks completion evidence.",
                "Completion evidence still requires a successful accepted scheduled monitor or reviewed private monitoring evidence.",
              ],
            };
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: workflowId,
              ref: "main",
              inputs: {
                expected_deployment_sha: expectedDeploymentSha,
              },
            });
            fs.writeFileSync(
              "artifacts/hosted-monitoring-schedule-fallback-dispatch.json",
              `${JSON.stringify(evidence, null, 2)}\n`,
            );

      - name: Upload schedule watchdog artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: hosted-schedule-watchdog-${{ github.run_id }}
          path: |
            artifacts/*.json
            artifacts/*.md
          if-no-files-found: warn

      - name: Route schedule watchdog failure issue
        if: ${{ always() && steps.readiness-status.outputs.status != 'passed' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "[hosted-schedule-watchdog]";
            const title = `${marker} Hosted Monitoring schedule not ready`;
            const runUrl = [
              process.env.GITHUB_SERVER_URL,
              process.env.GITHUB_REPOSITORY,
              "actions/runs",
              process.env.GITHUB_RUN_ID,
            ].join("/");
            const reportPath = "artifacts/hosted-monitoring-schedule-readiness.json";
            let report = {};
            let summary = {};
            let latest = {};
            let fallback = {};
            let failureLines = ["- report unavailable"];
            if (fs.existsSync(reportPath)) {
              report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
              summary = report.summary || {};
              latest = report.latest_schedule_run || {};
              const failures = Array.isArray(report.failures) ? report.failures : [];
              failureLines = failures.length
                ? failures.map((failure) => `- ${failure.code}: ${failure.message}`)
                : ["- none"];
            }
            const fallbackPath = "artifacts/hosted-monitoring-schedule-fallback-dispatch.json";
            if (fs.existsSync(fallbackPath)) {
              fallback = JSON.parse(fs.readFileSync(fallbackPath, "utf8"));
            }
            const body = [
              "Hosted Monitoring schedule readiness failed.",
              "",
              `- run: ${runUrl}`,
              `- workflow: ${process.env.GITHUB_WORKFLOW}`,
              `- event: ${process.env.GITHUB_EVENT_NAME}`,
              `- sha: ${process.env.GITHUB_SHA}`,
              `- readiness status: ${report.status ?? "unknown"}`,
              `- expected head sha: ${report.expected_head_sha ?? "unknown"}`,
              `- latest schedule run: ${latest.url ?? "unknown"}`,
              `- latest schedule sha: ${latest.head_sha ?? "unknown"}`,
              `- latest schedule conclusion: ${latest.conclusion ?? "unknown"}`,
              `- latest schedule age minutes: ${summary.age_minutes ?? "unknown"} / max ${summary.max_age_minutes ?? "unknown"}`,
              `- fallback dispatch status: ${fallback.status ?? "not_requested"}`,
              `- fallback target workflow: ${fallback.target_workflow?.workflow_id ?? "unknown"}`,
              "",
              "Failure reasons:",
              ...failureLines,
              "",
              "Artifacts, if uploaded, are attached to the workflow run.",
              "This issue route is public-safe and does not include tokens, manifests, or private evidence refs.",
            ].join("\n");
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Close resolved schedule watchdog issue
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "[hosted-schedule-watchdog]";
            const title = `${marker} Hosted Monitoring schedule not ready`;
            const reportPath = "artifacts/hosted-monitoring-schedule-readiness.json";
            if (!fs.existsSync(reportPath)) {
              core.info(`Skip closing ${title}: ${reportPath} was not written.`);
              return;
            }
            const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
            if (report.status !== "passed") {
              core.info(`Skip closing ${title}: readiness status is ${report.status}.`);
              return;
            }
            const runUrl = [
              process.env.GITHUB_SERVER_URL,
              process.env.GITHUB_REPOSITORY,
              "actions/runs",
              process.env.GITHUB_RUN_ID,
            ].join("/");
            const body = [
              "Hosted Monitoring schedule readiness resolved.",
              "",
              `- run: ${runUrl}`,
              `- workflow: ${process.env.GITHUB_WORKFLOW}`,
              `- event: ${process.env.GITHUB_EVENT_NAME}`,
              `- sha: ${process.env.GITHUB_SHA}`,
              `- status: ${report.status}`,
              "",
              "Closing the stale schedule watchdog issue.",
            ].join("\n");
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed",
                state_reason: "completed",
              });
            }
