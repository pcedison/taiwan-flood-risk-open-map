name: Hosted Monitoring

on:
  workflow_dispatch:
    inputs:
      expected_deployment_sha:
        description: "Expected /health deployment_sha. Defaults to the workflow commit SHA."
        required: false
        type: string
      require_admin_source_freshness:
        description: "Fail the workflow when ADMIN_BEARER_TOKEN is missing instead of skipping /admin/v1/sources freshness evidence."
        required: false
        default: false
        type: boolean
      fail_on_overdue_local_source_followups:
        description: "Fail when private local-source request dispatch evidence contains overdue official follow-ups."
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "*/30 * * * *"

jobs:
  hosted-monitoring:
    name: Hosted monitoring smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ADMIN_BEARER_TOKEN: ${{ secrets.ADMIN_BEARER_TOKEN }}
      HOSTED_WORKER_EVIDENCE_MANIFEST_B64: ${{ secrets.HOSTED_WORKER_EVIDENCE_MANIFEST_B64 }}
      HOSTED_WORKER_POLICY_EVIDENCE_MANIFEST_B64: ${{ secrets.HOSTED_WORKER_POLICY_EVIDENCE_MANIFEST_B64 }}
      HOSTED_MONITORING_EVIDENCE_MANIFEST_B64: ${{ secrets.HOSTED_MONITORING_EVIDENCE_MANIFEST_B64 }}
      LOCAL_SOURCE_REQUEST_DISPATCH_EVIDENCE_B64: ${{ secrets.LOCAL_SOURCE_REQUEST_DISPATCH_EVIDENCE_B64 }}
      REQUIRE_ADMIN_SOURCE_FRESHNESS: ${{ github.event.inputs.require_admin_source_freshness || 'false' }}
      FAIL_ON_OVERDUE_LOCAL_SOURCE_FOLLOWUPS: ${{ github.event.inputs.fail_on_overdue_local_source_followups || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve expected deployment SHA
        id: expected-sha
        env:
          INPUT_EXPECTED_DEPLOYMENT_SHA: ${{ github.event.inputs.expected_deployment_sha }}
        run: |
          set -euo pipefail
          expected_sha="${INPUT_EXPECTED_DEPLOYMENT_SHA:-${GITHUB_SHA}}"
          echo "sha=${expected_sha}" >> "${GITHUB_OUTPUT}"
          echo "Expected hosted deployment SHA: ${expected_sha}"

      - name: Prepare artifact directory
        run: mkdir -p artifacts

      - name: Hosted deployment smoke
        run: |
          set -euo pipefail
          python scripts/hosted_deployment_smoke.py \
            --expected-deployment-sha "${{ steps.expected-sha.outputs.sha }}" \
            --evidence-output artifacts/hosted-deployment-smoke.json \
            --completion-evidence-output artifacts/hosted-deployment-completion-evidence.json

      - name: Hosted public risk evidence smoke
        run: |
          set -euo pipefail
          python scripts/hosted_public_risk_evidence_smoke.py \
            --evidence-output artifacts/hosted-public-risk-evidence-smoke.json \
            --completion-evidence-output artifacts/hosted-public-risk-completion-evidence.json

      - name: Local source signal-gap discovery refresh
        run: |
          set -euo pipefail
          python scripts/local-source-signal-gap-discovery-refresh.py \
            --captured-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output-dir artifacts

      - name: Local source signal-gap dispatch readiness
        run: |
          set -euo pipefail
          python scripts/local-source-signal-gap-dispatch-readiness.py \
            --discovery-summary-json artifacts/signal-gap-discovery-refresh-summary.json \
            --captured-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output artifacts/signal-gap-dispatch-readiness.json

      - name: Local source contract dispatch readiness
        run: |
          set -euo pipefail
          python scripts/local-source-contract-dispatch-readiness.py \
            --captured-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output artifacts/source-contract-dispatch-readiness.json

      - name: Hosted private evidence readiness
        run: |
          set -euo pipefail
          python scripts/hosted_private_evidence_readiness.py \
            --captured-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output artifacts/hosted-private-evidence-readiness.json

      - name: Require admin source freshness token
        if: ${{ env.REQUIRE_ADMIN_SOURCE_FRESHNESS == 'true' && env.ADMIN_BEARER_TOKEN == '' }}
        run: |
          echo "::error title=ADMIN_BEARER_TOKEN is required::Set the ADMIN_BEARER_TOKEN repository secret or disable require_admin_source_freshness for non-release monitoring runs."
          exit 1

      - name: Hosted source freshness smoke
        if: ${{ env.ADMIN_BEARER_TOKEN != '' }}
        run: |
          set -euo pipefail
          python scripts/hosted_source_freshness_smoke.py \
            --admin-token-env ADMIN_BEARER_TOKEN \
            --evidence-output artifacts/hosted-source-freshness-smoke.json \
            --completion-evidence-output artifacts/hosted-source-freshness-completion-evidence.json

      - name: Skip admin freshness smoke without token
        if: ${{ env.ADMIN_BEARER_TOKEN == '' && env.REQUIRE_ADMIN_SOURCE_FRESHNESS != 'true' }}
        run: |
          echo "::notice title=Hosted source freshness skipped::ADMIN_BEARER_TOKEN is not configured, so /admin/v1/sources freshness evidence was not collected."

      - name: Hosted worker private evidence
        if: ${{ env.HOSTED_WORKER_EVIDENCE_MANIFEST_B64 != '' }}
        run: |
          set -euo pipefail
          worker_manifest="${RUNNER_TEMP}/hosted-worker-evidence-manifest.json"
          printf '%s' "${HOSTED_WORKER_EVIDENCE_MANIFEST_B64}" | base64 --decode > "${worker_manifest}"
          python scripts/hosted_worker_evidence.py \
            --manifest-json "${worker_manifest}" \
            --evidence-output artifacts/hosted-worker-evidence.json \
            --completion-evidence-output artifacts/hosted-worker-completion-evidence.json

      - name: Skip hosted worker private evidence without manifest
        if: ${{ env.HOSTED_WORKER_EVIDENCE_MANIFEST_B64 == '' }}
        run: |
          echo "::notice title=Hosted worker private evidence skipped::HOSTED_WORKER_EVIDENCE_MANIFEST_B64 is not configured, so hosted_worker_persisted_evidence was not collected."

      - name: Hosted worker policy private evidence
        if: ${{ env.HOSTED_WORKER_POLICY_EVIDENCE_MANIFEST_B64 != '' }}
        run: |
          set -euo pipefail
          worker_policy_manifest="${RUNNER_TEMP}/hosted-worker-policy-evidence-manifest.json"
          printf '%s' "${HOSTED_WORKER_POLICY_EVIDENCE_MANIFEST_B64}" | base64 --decode > "${worker_policy_manifest}"
          python scripts/hosted_worker_policy_evidence.py \
            --manifest-json "${worker_policy_manifest}" \
            --evidence-output artifacts/hosted-worker-policy-evidence.json \
            --completion-evidence-output artifacts/hosted-worker-policy-completion-evidence.json

      - name: Skip hosted worker policy private evidence without manifest
        if: ${{ env.HOSTED_WORKER_POLICY_EVIDENCE_MANIFEST_B64 == '' }}
        run: |
          echo "::notice title=Hosted worker policy private evidence skipped::HOSTED_WORKER_POLICY_EVIDENCE_MANIFEST_B64 is not configured, so raw snapshot retention, scheduler cadence, and hosted egress policy evidence were not collected."

      - name: Hosted monitoring private evidence
        if: ${{ env.HOSTED_MONITORING_EVIDENCE_MANIFEST_B64 != '' }}
        run: |
          set -euo pipefail
          monitoring_manifest="${RUNNER_TEMP}/hosted-monitoring-evidence-manifest.json"
          printf '%s' "${HOSTED_MONITORING_EVIDENCE_MANIFEST_B64}" | base64 --decode > "${monitoring_manifest}"
          python scripts/hosted_monitoring_evidence.py \
            --manifest-json "${monitoring_manifest}" \
            --evidence-output artifacts/hosted-monitoring-evidence.json \
            --completion-evidence-output artifacts/hosted-monitoring-completion-evidence.json

      - name: Skip hosted monitoring private evidence without manifest
        if: ${{ env.HOSTED_MONITORING_EVIDENCE_MANIFEST_B64 == '' }}
        run: |
          echo "::notice title=Hosted monitoring private evidence skipped::HOSTED_MONITORING_EVIDENCE_MANIFEST_B64 is not configured, so production_monitoring_and_alerting evidence was not collected."

      - name: Local source request dispatch follow-ups
        if: ${{ env.LOCAL_SOURCE_REQUEST_DISPATCH_EVIDENCE_B64 != '' }}
        run: |
          set -euo pipefail
          dispatch_manifest="${RUNNER_TEMP}/local-source-request-dispatch-evidence.json"
          printf '%s' "${LOCAL_SOURCE_REQUEST_DISPATCH_EVIDENCE_B64}" | base64 --decode > "${dispatch_manifest}"
          followup_args=()
          if [ "${FAIL_ON_OVERDUE_LOCAL_SOURCE_FOLLOWUPS}" = "true" ]; then
            followup_args+=(--fail-on-overdue)
          fi
          python scripts/local-source-request-followups.py \
            --completion-evidence-json "${dispatch_manifest}" \
            --as-of "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output artifacts/local-source-request-followups.json \
            --sanitized-completion-evidence-output artifacts/local-source-request-dispatch-completion-evidence.json \
            "${followup_args[@]}"

      - name: Skip local source request dispatch follow-ups without manifest
        if: ${{ env.LOCAL_SOURCE_REQUEST_DISPATCH_EVIDENCE_B64 == '' }}
        run: |
          echo "::notice title=Local source request dispatch follow-ups skipped::LOCAL_SOURCE_REQUEST_DISPATCH_EVIDENCE_B64 is not configured, so official request dispatch follow-up evidence was not collected."

      - name: Hosted completion audit
        if: ${{ always() }}
        run: |
          set -euo pipefail
          args=()
          for file in artifacts/*-completion-evidence.json; do
            if [ -f "$file" ]; then
              args+=(--completion-evidence-json "$file")
            fi
          done
          python scripts/local-source-completion-audit.py \
            "${args[@]}" \
            --as-of "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output artifacts/hosted-completion-audit.json \
            --markdown-output artifacts/hosted-completion-audit.md

      - name: Upload hosted monitoring artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: hosted-monitoring-${{ github.run_id }}
          path: |
            artifacts/*.json
            artifacts/*.md
          if-no-files-found: warn
