name: Local Source Dispatch Watchdog

on:
  workflow_dispatch:
    inputs:
      fail_on_dispatch_required:
        description: "Fail and route an issue when local-source request dispatch is still required. Scheduled runs report only."
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "7 16 * * *"

jobs:
  local-source-dispatch-watchdog:
    name: Local source dispatch watchdog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      FAIL_ON_DISPATCH_REQUIRED: ${{ github.event.inputs.fail_on_dispatch_required || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare artifact directory
        run: mkdir -p artifacts/request-packet-bundle

      - name: Local source signal-gap discovery refresh
        run: |
          set -euo pipefail
          python scripts/local-source-signal-gap-discovery-refresh.py \
            --captured-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --allow-fetch-failure \
            --output-dir artifacts

      - name: Local source signal-gap dispatch readiness
        run: |
          set -euo pipefail
          python scripts/local-source-signal-gap-dispatch-readiness.py \
            --discovery-summary-json artifacts/signal-gap-discovery-refresh-summary.json \
            --captured-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output artifacts/local-source-signal-gap-dispatch-readiness.json

      - name: Local source contract dispatch readiness
        run: |
          set -euo pipefail
          python scripts/local-source-contract-dispatch-readiness.py \
            --captured-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output artifacts/local-source-contract-dispatch-readiness.json

      - name: Local source request packet bundle
        run: |
          set -euo pipefail
          python scripts/local-source-request-packet-bundle.py \
            --captured-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output-dir artifacts/request-packet-bundle

      - name: Local source dispatch watchdog
        run: |
          set -euo pipefail
          watchdog_args=()
          if [ "${FAIL_ON_DISPATCH_REQUIRED}" = "true" ]; then
            watchdog_args+=(--fail-on-dispatch-required)
          fi
          python scripts/local-source-dispatch-watchdog.py \
            --signal-gap-dispatch-readiness-json artifacts/local-source-signal-gap-dispatch-readiness.json \
            --source-contract-dispatch-readiness-json artifacts/local-source-contract-dispatch-readiness.json \
            --request-dispatch-queue-json artifacts/request-packet-bundle/local-source-request-dispatch-queue.json \
            --captured-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output artifacts/local-source-dispatch-watchdog.json \
            --markdown-output artifacts/local-source-dispatch-watchdog.md \
            "${watchdog_args[@]}"

      - name: Upload local source dispatch artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: local-source-dispatch-watchdog-${{ github.run_id }}
          path: |
            artifacts/**/*.json
            artifacts/**/*.md
          if-no-files-found: warn

      - name: Route local source dispatch watchdog issue
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "[local-source-dispatch-watchdog]";
            const title = `${marker} Local source dispatch required`;
            const runUrl = [
              process.env.GITHUB_SERVER_URL,
              process.env.GITHUB_REPOSITORY,
              "actions/runs",
              process.env.GITHUB_RUN_ID,
            ].join("/");
            const reportPath = "artifacts/local-source-dispatch-watchdog.json";
            let summary = {};
            let status = "watchdog_failed_before_report";
            let operator_next_steps = [];
            let request_dispatch_queue_items = [];
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
              status = report.status;
              summary = report.summary || {};
              operator_next_steps = Array.isArray(report.operator_next_steps)
                ? report.operator_next_steps
                : [];
              request_dispatch_queue_items = Array.isArray(report.request_dispatch_queue_items)
                ? report.request_dispatch_queue_items
                : [];
            }
            const stepLines = operator_next_steps.length
              ? operator_next_steps.map((step) => `- ${step}`)
              : ["- See uploaded local-source dispatch artifacts for next actions."];
            const queueLines = request_dispatch_queue_items.length
              ? request_dispatch_queue_items
                  .slice(0, 5)
                  .map((item) => {
                    const label = item.target_signal_type || item.source_contract_gate || "unknown";
                    const fields = (item.required_read_api_fields || []).join(", ") || "not listed";
                    const statuses = (item.accepted_completion_statuses || []).join(", ") || "not listed";
                    const counterparty = item.requested_counterparty || item.county || "not listed";
                    return `- ${item.queue_id}: ${item.request_type} / ${label} (${item.completion_target_count} completion targets); fields ${fields}; accepted ${statuses}; counterparty ${counterparty}`;
                  })
              : ["- See uploaded request dispatch queue artifact for grouped dispatch items."];
            const body = [
              "Local source dispatch watchdog requires operator follow-up.",
              "",
              `- run: ${runUrl}`,
              `- workflow: ${process.env.GITHUB_WORKFLOW}`,
              `- event: ${process.env.GITHUB_EVENT_NAME}`,
              `- sha: ${process.env.GITHUB_SHA}`,
              `- status: ${status}`,
              `- signal gap groups needing dispatch: ${summary.signal_gap_dispatch_recommended_group_count ?? "unknown"}`,
              `- signal gap county-items: ${summary.signal_gap_county_item_count ?? "unknown"}`,
              `- source contract items needing dispatch: ${summary.source_contract_dispatch_recommended_item_count ?? "unknown"}`,
              `- authorization requests: ${summary.authorization_request_count ?? "unknown"}`,
              `- metadata release monitors: ${summary.metadata_release_monitor_count ?? "unknown"}`,
              `- public API contract reviews: ${summary.public_api_contract_review_count ?? "unknown"}`,
              "",
              "Operator next steps:",
              ...stepLines,
              "",
              "Request dispatch queue:",
              ...queueLines,
              "",
              "Artifacts, if uploaded, are attached to the workflow run.",
              "This issue route is public-safe and does not include tokens, private evidence refs, manifests, or official correspondence.",
            ].join("\n");
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Close resolved local source dispatch issue
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "[local-source-dispatch-watchdog]";
            const title = `${marker} Local source dispatch required`;
            const reportPath = "artifacts/local-source-dispatch-watchdog.json";
            if (!fs.existsSync(reportPath)) {
              core.info(`Skip closing ${title}: ${reportPath} was not written.`);
              return;
            }
            const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
            const summary = report.summary || {};
            if (
              report.status !== "no_dispatch_required" ||
              summary.dispatch_required !== false
            ) {
              core.info(
                `Skip closing ${title}: dispatch status is ${report.status}.`,
              );
              return;
            }
            const runUrl = [
              process.env.GITHUB_SERVER_URL,
              process.env.GITHUB_REPOSITORY,
              "actions/runs",
              process.env.GITHUB_RUN_ID,
            ].join("/");
            const body = [
              "Local source dispatch watchdog resolved.",
              "",
              `- run: ${runUrl}`,
              `- workflow: ${process.env.GITHUB_WORKFLOW}`,
              `- event: ${process.env.GITHUB_EVENT_NAME}`,
              `- sha: ${process.env.GITHUB_SHA}`,
              `- status: ${report.status}`,
              `- dispatch required: ${summary.dispatch_required}`,
              "",
              "Closing the stale local source dispatch issue.",
            ].join("\n");
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed",
                state_reason: "completed",
              });
            }
