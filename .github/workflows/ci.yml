name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "apps/api[dev]"
          python -m pip install -e "apps/workers[dev]"

      - name: Compile Python skeletons
        run: python -m compileall apps/api apps/workers

      - name: Backend lint
        run: python -m ruff check apps/api/app apps/api/tests apps/workers/app apps/workers/tests

      - name: Backend typecheck
        run: |
          cd apps/api
          python -m mypy app
          cd ../workers
          python -m mypy app

      - name: Backend unit tests
        run: |
          set -euo pipefail

          run_pytest_or_empty_suite() {
            local app_dir="$1"
            if find "$app_dir/tests" -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
              (cd "$app_dir" && python -m pytest)
            else
              echo "::notice title=Empty backend test suite::$app_dir has no pytest files yet; Phase 1 allows this only through this explicit empty-suite check."
            fi
          }

          run_pytest_or_empty_suite apps/api
          run_pytest_or_empty_suite apps/workers

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate frontend package metadata
        run: node -e "JSON.parse(require('fs').readFileSync('apps/web/package.json', 'utf8'))"

      - name: Require frontend dependency lockfile
        run: |
          set -euo pipefail
          if [ ! -f apps/web/package-lock.json ] && [ ! -f apps/web/npm-shrinkwrap.json ]; then
            echo "::error title=Missing frontend lockfile::Add apps/web/package-lock.json or apps/web/npm-shrinkwrap.json before enabling npm-based frontend hard gates. CI must not pass with unresolved dependency versions."
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci --prefix apps/web

      - name: Frontend lint
        run: npm run lint --prefix apps/web

      - name: Frontend typecheck
        run: npm run typecheck --prefix apps/web

      - name: Frontend unit tests
        run: |
          set -euo pipefail
          if find apps/web -type f \( \
            -name "*.test.ts" -o -name "*.test.tsx" -o -name "*.spec.ts" -o -name "*.spec.tsx" -o \
            -name "*.test.js" -o -name "*.test.jsx" -o -name "*.spec.js" -o -name "*.spec.jsx" \
          \) | grep -q .; then
            npm test --prefix apps/web
          else
            echo "::notice title=Empty frontend test suite::apps/web has no JS/TS test files yet; Phase 1 allows this only through this explicit empty-suite check."
          fi

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Frontend E2E smoke
        run: npm run e2e --prefix apps/web

  contracts:
    name: Contract and compose checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install contract validator dependencies
        run: pip install --quiet "openapi-spec-validator>=0.7" "jsonschema>=4.21" "pyyaml>=6"

      - name: Validate OpenAPI spec
        run: python infra/scripts/validate_openapi.py

      - name: Validate contract fixtures against OpenAPI
        run: python infra/scripts/validate_contract_fixtures.py

      - name: Validate migration files
        run: python infra/scripts/validate_migrations.py

      - name: Validate source allowlists
        run: python infra/scripts/validate_source_allowlist.py

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Migration smoke on PostGIS
        run: |
          set -euo pipefail
          docker compose up -d postgres
          docker compose --profile tools run --rm migrate
          table_count="$(
            docker compose exec -T postgres psql -U flood_risk -d flood_risk -tAc \
              "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('data_sources','raw_snapshots','staging_evidence','evidence','location_queries','risk_assessments','risk_assessment_evidence','query_heat_buckets','map_layers','ingestion_jobs','adapter_runs','user_reports','audit_logs');"
          )"
          if [ "$table_count" != "13" ]; then
            echo "::error title=Migration smoke failed::Expected 13 core tables, got ${table_count}"
            exit 1
          fi
