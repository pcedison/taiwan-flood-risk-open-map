name: GitHub Actions Secret Readiness Watchdog

on:
  workflow_dispatch:
    inputs:
      fail_on_completion_blockers:
        description: "Fail and route an issue when required secret routes still block completion gates. Scheduled runs report only."
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "23 16 * * *"

jobs:
  secret-readiness-watchdog:
    name: GitHub Actions secret readiness watchdog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      FAIL_ON_COMPLETION_BLOCKERS: ${{ github.event.inputs.fail_on_completion_blockers || 'false' }}
      ADMIN_BEARER_TOKEN_CONFIGURED: ${{ secrets.ADMIN_BEARER_TOKEN != '' }}
      HOSTED_WORKER_EVIDENCE_MANIFEST_B64_CONFIGURED: ${{ secrets.HOSTED_WORKER_EVIDENCE_MANIFEST_B64 != '' }}
      HOSTED_WORKER_POLICY_EVIDENCE_MANIFEST_B64_CONFIGURED: ${{ secrets.HOSTED_WORKER_POLICY_EVIDENCE_MANIFEST_B64 != '' }}
      HOSTED_MONITORING_EVIDENCE_MANIFEST_B64_CONFIGURED: ${{ secrets.HOSTED_MONITORING_EVIDENCE_MANIFEST_B64 != '' }}
      LOCAL_SOURCE_REQUEST_DISPATCH_EVIDENCE_B64_CONFIGURED: ${{ secrets.LOCAL_SOURCE_REQUEST_DISPATCH_EVIDENCE_B64 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Prepare artifact directory
        run: mkdir -p artifacts

      - name: GitHub Actions secret readiness
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os

          secret_env_names = {
              "ADMIN_BEARER_TOKEN": "ADMIN_BEARER_TOKEN_CONFIGURED",
              "HOSTED_WORKER_EVIDENCE_MANIFEST_B64": "HOSTED_WORKER_EVIDENCE_MANIFEST_B64_CONFIGURED",
              "HOSTED_WORKER_POLICY_EVIDENCE_MANIFEST_B64": "HOSTED_WORKER_POLICY_EVIDENCE_MANIFEST_B64_CONFIGURED",
              "HOSTED_MONITORING_EVIDENCE_MANIFEST_B64": "HOSTED_MONITORING_EVIDENCE_MANIFEST_B64_CONFIGURED",
              "LOCAL_SOURCE_REQUEST_DISPATCH_EVIDENCE_B64": "LOCAL_SOURCE_REQUEST_DISPATCH_EVIDENCE_B64_CONFIGURED",
          }
          rows = [
              {
                  "name": secret_name,
                  "configured": os.environ.get(env_name, "").lower() == "true",
              }
              for secret_name, env_name in secret_env_names.items()
          ]
          with open("artifacts/github-actions-secret-presence.json", "w", encoding="utf-8") as handle:
              json.dump(rows, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY
          readiness_args=()
          if [ "${FAIL_ON_COMPLETION_BLOCKERS}" = "true" ]; then
            readiness_args+=(--fail-on-completion-blockers)
          fi
          python scripts/github-actions-secret-readiness.py \
            --captured-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --secrets-json artifacts/github-actions-secret-presence.json \
            --output artifacts/github-actions-secret-readiness.json \
            --markdown-output artifacts/github-actions-secret-readiness.md \
            "${readiness_args[@]}"

      - name: Upload secret readiness artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: github-actions-secret-readiness-${{ github.run_id }}
          path: |
            artifacts/*.json
            artifacts/*.md
          if-no-files-found: warn

      - name: Route secret readiness watchdog issue
        if: ${{ failure() }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require("fs");
            const marker = "[secret-readiness-watchdog]";
            const title = `${marker} GitHub Actions required secrets missing`;
            const runUrl = [
              process.env.GITHUB_SERVER_URL,
              process.env.GITHUB_REPOSITORY,
              "actions/runs",
              process.env.GITHUB_RUN_ID,
            ].join("/");
            const reportPath = "artifacts/github-actions-secret-readiness.json";
            let summary = {};
            let blockers = [];
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
              summary = report.summary || {};
              blockers = report.completion_gate_blockers || [];
            }
            const blockerLines = blockers.map((blocker) => {
              const missing = (blocker.missing_secret_names || []).join(", ");
              return `- ${blocker.gate_key}: ${missing}`;
            });
            const routeLines = blockers.flatMap((blocker) => {
              const routes = blocker.unsatisfied_routes || [];
              return routes.map((route) => {
                const missing = (route.missing_secret_names || []).join(", ");
                const requirements = (route.satisfied_requirements || []).join(", ");
                const action = route.next_operator_action || "Review the private evidence handoff runbook.";
                return `- ${blocker.gate_key}/${route.route_key}: missing ${missing}; requirements ${requirements}; next ${action}`;
              });
            });
            const body = [
              "GitHub Actions secret readiness still blocks completion gates.",
              "",
              `- run: ${runUrl}`,
              `- workflow: ${process.env.GITHUB_WORKFLOW}`,
              `- event: ${process.env.GITHUB_EVENT_NAME}`,
              `- sha: ${process.env.GITHUB_SHA}`,
              `- tracked secrets configured: ${summary.configured_tracked_secret_count ?? "unknown"}/${summary.tracked_secret_count ?? "unknown"}`,
              `- missing required-for-completion secrets: ${summary.missing_required_for_completion_count ?? "unknown"}`,
              `- completion gate blockers: ${summary.completion_gate_blocker_count ?? "unknown"}`,
              "",
              "Blocked gates:",
              ...(blockerLines.length ? blockerLines : ["- unknown"]),
              "",
              "Route details:",
              ...(routeLines.length ? routeLines : ["- unknown"]),
              "",
              "Operator next steps:",
              "- Read docs/runbooks/monitoring-freshness-alerts.md#github-actions-secret-readiness-watchdog before setting repository secrets.",
              "- ADMIN_BEARER_TOKEN unlocks admin source freshness smoke; keep the value private and scoped to /admin/v1/sources.",
              "- HOSTED_WORKER_EVIDENCE_MANIFEST_B64 unlocks hosted worker evidence; use only reviewed private ops refs.",
              "- HOSTED_WORKER_POLICY_EVIDENCE_MANIFEST_B64 unlocks worker policy evidence for raw snapshot retention, scheduler cadence, and hosted egress review.",
              "- HOSTED_MONITORING_EVIDENCE_MANIFEST_B64 unlocks monitoring evidence for alert routing and worker/scheduler ownership.",
              "- LOCAL_SOURCE_REQUEST_DISPATCH_EVIDENCE_B64 unlocks private official request dispatch follow-up evidence when available.",
              "",
              "Artifacts, if uploaded, are attached to the workflow run.",
              "This issue route is public-safe and includes only secret names and presence metadata, never secret values, tokens, manifests, or decoded private evidence.",
            ].join("\n");
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Close resolved secret readiness issue
        if: ${{ success() }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require("fs");
            const marker = "[secret-readiness-watchdog]";
            const title = `${marker} GitHub Actions required secrets missing`;
            const reportPath = "artifacts/github-actions-secret-readiness.json";
            if (!fs.existsSync(reportPath)) {
              core.info(`Skip closing ${title}: ${reportPath} was not written.`);
              return;
            }
            const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
            const summary = report.summary || {};
            if (
              summary.completion_gate_blocker_count !== 0 ||
              summary.missing_required_for_completion_count !== 0
            ) {
              core.info(
                `Skip closing ${title}: ${summary.completion_gate_blocker_count ?? "unknown"} completion gate blockers remain.`,
              );
              return;
            }
            const runUrl = [
              process.env.GITHUB_SERVER_URL,
              process.env.GITHUB_REPOSITORY,
              "actions/runs",
              process.env.GITHUB_RUN_ID,
            ].join("/");
            const body = [
              "GitHub Actions secret readiness resolved.",
              "",
              `- run: ${runUrl}`,
              `- workflow: ${process.env.GITHUB_WORKFLOW}`,
              `- event: ${process.env.GITHUB_EVENT_NAME}`,
              `- sha: ${process.env.GITHUB_SHA}`,
              `- completion gate blockers: ${summary.completion_gate_blocker_count}`,
              `- missing required-for-completion secrets: ${summary.missing_required_for_completion_count}`,
              "",
              "Closing the stale secret readiness issue.",
            ].join("\n");
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed",
                state_reason: "completed",
              });
            }
