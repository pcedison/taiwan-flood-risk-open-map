global:
  scrape_interval: 15s

rule_files:
  - alert-rules.yml

scrape_configs:
  # API metrics/readiness scrape. In Docker Compose-like networks this target is
  # usually api:8000; in hosted environments replace it with the internal API
  # host:port that exposes GET /metrics.
  - job_name: flood-risk-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Textfile collector metrics emitted by the freshness script and
  # worker/scheduler runtimes. The Compose monitoring profile provides
  # node-exporter with:
  #
  #   --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
  #
  # Hosted environments can replace this target with their node-exporter DNS
  # name or remove it when another collector owns textfile ingestion.
  - job_name: flood-risk-node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
