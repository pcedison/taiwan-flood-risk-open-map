global:
  scrape_interval: 15s

rule_files:
  - alert-rules.yml

scrape_configs:
  # API metrics/readiness scrape. In Docker Compose-like networks this target is
  # usually api:8000; in hosted environments replace it with the internal API
  # host:port that exposes GET /metrics.
  - job_name: flood-risk-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Optional node exporter scrape for textfile collector metrics emitted by the
  # freshness script and worker/scheduler runtimes. Enable this only when
  # node_exporter is deployed with:
  #
  #   --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
  #
  # Then write .prom files into that directory, such as:
  #
  #   flood-risk-source-freshness.prom
  #   flood-risk-worker.prom
  #   flood-risk-scheduler.prom
  #
  # - job_name: flood-risk-node-exporter
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
